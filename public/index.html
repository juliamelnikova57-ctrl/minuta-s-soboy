<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Минута с собой</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F2F0E4;
    --bg2: #E6E4D0;
    --bg3: #DDDBC6;
    --text: #2A2E18;
    --sub: #6B7040;
    --accent: #8B9050;
    --btn: #6B7040;
    --btn-text: #F2F0E4;
    --border: rgba(107,112,64,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .screen { display: none; width: 100%; max-width: 480px; min-height: 100vh; padding: 0; flex-direction: column; }
  .screen.active { display: flex; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .topbar-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: .15em;
    color: var(--text);
  }

  .topbar-nav { display: flex; gap: 1.5rem; }

  .nav-btn {
    background: none;
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--sub);
    cursor: pointer;
    padding: 4px 0;
    border-bottom: 1px solid transparent;
  }

  .nav-btn:hover, .nav-btn.active {
    color: var(--text);
    border-bottom-color: var(--text);
  }

  #home { justify-content: flex-start; }

  .home-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 2rem;
    text-align: center;
  }

  .word-label {
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
  }

  .word-of-day {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px;
    font-weight: 300;
    color: var(--text);
    line-height: 1;
    margin-bottom: 2rem;
  }

  .nature-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-style: italic;
    font-weight: 300;
    color: var(--sub);
    line-height: 1.9;
    margin-bottom: 2rem;
    max-width: 340px;
  }

  .question-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 3rem;
    max-width: 320px;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 3rem;
  }

  .cta-btn, .send-btn {
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 4px;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .cta-btn {
    padding: 14px 2.5rem;
    font-size: 12px;
  }

  .send-btn {
    padding: 10px 24px;
    font-size: 11px;
  }

  .cta-btn:hover, .send-btn:hover { opacity: .85; }

  .regenerate-btn {
    margin-top: 1rem;
    background: none;
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    color: var(--accent);
    cursor: pointer;
    letter-spacing: .05em;
  }

  .loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--sub);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

  #chat { justify-content: flex-start; }

  .chat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .back-btn {
    background: none;
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    color: var(--sub);
    cursor: pointer;
  }

  .vera-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--sub);
  }

  .vera-info { flex: 1; }

  .vera-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--text);
  }

  .vera-status {
    font-size: 10px;
    color: var(--accent);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .msg { display: flex; flex-direction: column; max-width: 85%; }
  .msg.vera { align-self: flex-start; }
  .msg.user { align-self: flex-end; align-items: flex-end; }

  .msg-name {
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 2px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    line-height: 1.7;
  }

  .msg.vera .msg-bubble {
    background: var(--bg2);
    border-left: 2px solid var(--accent);
    color: var(--text);
  }

  .msg.user .msg-bubble {
    background: var(--btn);
    color: var(--btn-text);
  }

  .typing-bubble {
    background: var(--bg2);
    border-left: 2px solid var(--accent);
    padding: 12px 16px;
    border-radius: 2px;
    display: flex;
    gap: 4px;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typing .9s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }

  @keyframes typing {
    0%,100% { opacity:.3; transform:translateY(0); }
    50% { opacity:1; transform:translateY(-3px); }
  }

  .chat-input-area {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: .75rem;
  }

  .chat-textarea {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--text);
    resize: none;
    outline: none;
    line-height: 1.6;
    min-height: 64px;
  }

  .chat-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .insight-link {
    background: none;
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    color: var(--sub);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
  }

  #history { justify-content: flex-start; }

  .history-body {
    flex: 1;
    padding: 1.5rem;
    overflow-y: auto;
  }

  .history-empty {
    text-align: center;
    padding: 4rem 2rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--sub);
    line-height: 1.8;
  }

  .history-entry {
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 0;
    cursor: pointer;
  }

  .history-date {
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .5rem;
  }

  .history-word {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 300;
    color: var(--text);
  }

  .history-preview {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-style: italic;
    color: var(--sub);
    line-height: 1.6;
  }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }

  .fadein { animation: fadeIn .5s ease forwards; }
</style>
</head>
<body>

<div id="home" class="screen active">
  <div class="topbar">
    <div class="topbar-logo">Минута с собой</div>
    <div class="topbar-nav">
      <button class="nav-btn active" onclick="showScreen('home')">Сегодня</button>
      <button class="nav-btn" onclick="showScreen('history')">История</button>
    </div>
  </div>
  <div class="home-body" id="home-body">
    <div class="loading-text">Вера думает о слове для тебя...</div>
  </div>
</div>

<div id="chat" class="screen">
  <div class="chat-header">
    <button class="back-btn" onclick="showScreen('home')">← назад</button>
    <div class="vera-avatar">В</div>
    <div class="vera-info">
      <div class="vera-name">Вера</div>
      <div class="vera-status">здесь для тебя</div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="chat-input-area">
    <textarea class="chat-textarea" id="chat-input" placeholder="Напиши что чувствуешь..." rows="2" onkeydown="handleKey(event)"></textarea>
    <div class="chat-actions">
      <button class="insight-link" onclick="askInsight()">Что заметила Вера?</button>
      <button class="send-btn" onclick="sendMessage()" id="send-btn">Отправить</button>
    </div>
  </div>
</div>

<div id="history" class="screen">
  <div class="topbar">
    <div class="topbar-logo">Минута с собой</div>
    <div class="topbar-nav">
      <button class="nav-btn" onclick="showScreen('home')">Сегодня</button>
      <button class="nav-btn active" onclick="showScreen('history')">История</button>
    </div>
  </div>
  <div class="history-body" id="history-body"></div>
</div>

<script>
const API_URL = '/api/chat';

let todayData = null;
let chatHistory = [];
let allSessions = [];

const VERA_SYSTEM = `Ты — Вера. Тихий и глубокий собеседник.

Ты не психолог и не коуч. Ты не даёшь советов. Ты не объясняешь и не анализируешь вслух. Ты просто рядом.

Как ты говоришь:
— Коротко.
— Сначала отражаешь одной фразой.
— Потом задаёшь один вопрос.
— Только один вопрос.
— Не спрашиваешь "почему".
— Отвечаешь только на русском языке.

Если человеку очень плохо — мягко говоришь, что есть люди, которые умеют помочь глубже, и обратиться к ним — это сила.`;

function loadSessions() {
  const saved = localStorage.getItem('vera_sessions');
  allSessions = saved ? JSON.parse(saved) : [];
}

function saveSessions() {
  localStorage.setItem('vera_sessions', JSON.stringify(allSessions));
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name).classList.add('active');

  if (name === 'history') renderHistory();

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => {
    if ((name === 'home' && b.textContent === 'Сегодня') ||
        (name === 'history' && b.textContent === 'История')) {
      b.classList.add('active');
    }
  });
}

async function callClaude(messages, system, maxTokens = 800) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: maxTokens,
      system: system,
      messages: messages
    })
  });

  const data = await res.json();

  if (!res.ok) {
    throw new Error(data.error || 'Ошибка сервера');
  }

  if (data.error) {
    throw new Error(data.error.message || data.error);
  }

  return data.content[0].text;
}

async function generateToday() {
  const today = new Date().toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
  const saved = localStorage.getItem('vera_today_' + today);

  if (saved) {
    todayData = JSON.parse(saved);
    renderHome();
    return;
  }

  try {
    const prompt = `Сгенерируй для дневника рефлексии на сегодня:
1. Одно русское слово.
2. Короткий образ из природы 2-3 предложения.
3. Один вопрос для рефлексии.

Ответь строго JSON:
{"word":"...","nature":"...","question":"..."}`;

    const text = await callClaude(
      [{role:'user', content: prompt}],
      'Ты создаёшь поэтичный контент для дневника рефлексии. Отвечаешь только JSON без markdown.',
      300
    );

    const clean = text.replace(/```json|```/g,'').trim();
    todayData = JSON.parse(clean);
    todayData.date = today;

    localStorage.setItem('vera_today_' + today, JSON.stringify(todayData));
    renderHome();

  } catch(e) {
    document.getElementById('home-body').innerHTML =
      `<div style="text-align:center;color:var(--sub);font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;line-height:1.8">
        Что-то пошло не так.<br>
        Проверь, добавлен ли ANTHROPIC_API_KEY в Render.<br><br>
        <button onclick="generateToday()" style="background:none;border:none;cursor:pointer;color:var(--sub);font-size:13px;border-bottom:1px solid var(--border);padding-bottom:2px;">
          Попробовать снова
        </button>
      </div>`;
  }
}

function renderHome() {
  if (!todayData) return;

  document.getElementById('home-body').innerHTML = `
    <div class="fadein" style="display:flex;flex-direction:column;align-items:center;width:100%;text-align:center">
      <div class="word-label">${todayData.date || 'Сегодня'}</div>
      <div class="word-of-day">${todayData.word}</div>
      <div class="nature-text">${todayData.nature}</div>
      <div class="divider"></div>
      <div class="question-text">${todayData.question}</div>
      <button class="cta-btn" onclick="openChat()">Поговорить с Верой</button>
      <button class="regenerate-btn" onclick="refreshToday()">другое слово</button>
    </div>`;
}

function refreshToday() {
  if (!todayData) return;

  const today = todayData.date;
  localStorage.removeItem('vera_today_' + today);
  todayData = null;

  document.getElementById('home-body').innerHTML =
    '<div class="loading-text">Вера думает о новом слове...</div>';

  generateToday();
}

function openChat() {
  const today = todayData?.date || new Date().toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
  const existing = allSessions.find(s => s.date === today);

  chatHistory = existing ? existing.messages : [];

  showScreen('chat');
  renderMessages();

  if (chatHistory.length === 0) veraOpening();
}

async function veraOpening() {
  showTyping();

  try {
    const prompt = `Сегодняшнее слово — "${todayData.word}". Образ: "${todayData.nature}". Вопрос: "${todayData.question}". Начни диалог: один короткий отклик и один мягкий вопрос.`;
    const text = await callClaude([{role:'user', content: prompt}], VERA_SYSTEM);

    hideTyping();
    addMessage('vera', text);
    saveChat();

  } catch(e) {
    hideTyping();
    addMessage('vera', 'Я здесь. Как ты сейчас?');
  }
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();

  if (!text) return;

  input.value = '';
  addMessage('user', text);

  document.getElementById('send-btn').disabled = true;
  showTyping();

  try {
    const messages = chatHistory.map(m => ({
      role: m.role === 'vera' ? 'assistant' : 'user',
      content: m.text
    }));

    const reply = await callClaude(messages, VERA_SYSTEM);

    hideTyping();
    addMessage('vera', reply);
    saveChat();

  } catch(e) {
    hideTyping();
    addMessage('vera', 'Что-то помешало мне ответить. Попробуй ещё раз.');
  }

  document.getElementById('send-btn').disabled = false;
}

async function askInsight() {
  if (allSessions.length === 0 && chatHistory.length === 0) {
    addMessage('vera', 'Пока у нас мало разговоров. Возвращайся — и я начну замечать нити.');
    return;
  }

  showTyping();

  const allText = allSessions.map(s =>
    `${s.date}: ${s.messages.map(m => `[${m.role}] ${m.text}`).join(' | ')}`
  ).join('\n');

  try {
    const prompt = `Вот история разговоров:\n${allText}\n\nНайди одну тихую повторяющуюся тему. Ответ 2-3 предложения.`;
    const text = await callClaude([{role:'user', content: prompt}], VERA_SYSTEM);

    hideTyping();
    addMessage('vera', text);

  } catch(e) {
    hideTyping();
    addMessage('vera', 'Не смогла посмотреть на нашу историю прямо сейчас.');
  }
}

function addMessage(role, text) {
  chatHistory.push({role, text});
  renderMessages();
}

function renderMessages() {
  const el = document.getElementById('messages');

  el.innerHTML = chatHistory.map(m => `
    <div class="msg ${m.role} fadein">
      <div class="msg-name">${m.role === 'vera' ? 'Вера' : 'Ты'}</div>
      <div class="msg-bubble">${m.text.replace(/\n/g,'<br>')}</div>
    </div>
  `).join('');

  el.scrollTop = el.scrollHeight;
}

function showTyping() {
  const el = document.getElementById('messages');

  el.innerHTML += `
    <div class="msg vera" id="typing-indicator">
      <div class="msg-name">Вера</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;

  el.scrollTop = el.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function saveChat() {
  const today = todayData?.date || new Date().toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
  const idx = allSessions.findIndex(s => s.date === today);

  const session = {
    date: today,
    word: todayData?.word || '',
    messages: chatHistory
  };

  if (idx >= 0) allSessions[idx] = session;
  else allSessions.unshift(session);

  saveSessions();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function renderHistory() {
  const el = document.getElementById('history-body');

  if (allSessions.length === 0) {
    el.innerHTML = `<div class="history-empty">Здесь будут храниться<br>твои разговоры с Верой.<br><br>Начни сегодня.</div>`;
    return;
  }

  el.innerHTML = allSessions.map(s => `
    <div class="history-entry" onclick="openSession('${s.date}')">
      <div class="history-date">${s.date}</div>
      <div class="history-word">${s.word}</div>
      <div class="history-preview">${s.messages.find(m => m.role === 'user')?.text || 'Разговор с Верой'}</div>
    </div>
  `).join('');
}

function openSession(date) {
  const session = allSessions.find(s => s.date === date);
  if (!session) return;

  chatHistory = session.messages;
  showScreen('chat');
  renderMessages();
}

window.addEventListener('load', () => {
  loadSessions();
  showScreen('home');
  generateToday();
});
</script>
</body>
</html>
