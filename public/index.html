<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Минута с собой</title>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png?v=2">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png?v=2">
<link rel="icon" href="/favicon.ico?v=2">
<link rel="shortcut icon" href="/favicon.ico?v=2">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=2">
<link rel="manifest" href="/manifest.json?v=2">
<meta name="theme-color" content="#F2F0E4">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F2F0E4;
    --bg2: #E6E4D0;
    --bg3: #DDDBC6;
    --text: #2A2E18;
    --sub: #6B7040;
    --accent: #8B9050;
    --btn: #6B7040;
    --btn-text: #F2F0E4;
    --border: rgba(107,112,64,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .screen { display: none; width: 100%; max-width: 480px; min-height: 100vh; padding: 0; flex-direction: column; }
  .screen.active { display: flex; }

  .topbar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    padding: 1rem 1.5rem 0.8rem;
    border-bottom: 1px solid var(--border);
  }

  .topbar-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 500;
    font-style: italic;
    letter-spacing: .08em;
    color: var(--text);
  }

  .topbar-tagline {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: -0.2rem;
  }

  .topbar-nav { display: flex; gap: 1.5rem; }

  .nav-btn {
    background: none;
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--sub);
    cursor: pointer;
    padding: 4px 0;
    border-bottom: 1px solid transparent;
  }

  .nav-btn:hover, .nav-btn.active {
    color: var(--text);
    border-bottom-color: var(--text);
  }

  #home { justify-content: flex-start; }

  .home-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0.75rem 1.5rem 1.25rem;
    text-align: center;
  }

  .word-label {
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .6rem;
  }

  .word-of-day {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: .6rem;
  }

  .card-image {
    width: 100%;
    max-width: 280px;
    aspect-ratio: 3 / 4;
    object-fit: cover;
    border-radius: 4px;
    margin-bottom: .5rem;
    box-shadow: 0 6px 28px rgba(42, 46, 24, 0.08);
  }

  .nature-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-style: italic;
    font-weight: 300;
    color: var(--sub);
    line-height: 1.5;
    margin-bottom: .9rem;
    max-width: 340px;
  }

  .question-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 1.1rem;
    max-width: 320px;
  }

  .divider {
    width: 32px;
    height: 1px;
    background: var(--border);
    margin: 0 auto .9rem;
  }

  .cta-btn, .send-btn {
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 4px;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .cta-btn {
    padding: 12px 2rem;
    font-size: 11px;
  }

  .send-btn {
    padding: 10px 24px;
    font-size: 11px;
  }

  .cta-btn:hover, .send-btn:hover { opacity: .85; }

  .regenerate-btn {
    margin-top: 1rem;
    background: none;
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    color: var(--accent);
    cursor: pointer;
    letter-spacing: .05em;
  }

  .loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--sub);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

  #chat { justify-content: flex-start; }

  .chat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .back-btn {
    background: none;
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    color: var(--sub);
    cursor: pointer;
  }

  .vera-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--sub);
  }

  .vera-info { flex: 1; }

  .vera-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--text);
  }

  .vera-status {
    font-size: 10px;
    color: var(--accent);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .msg { display: flex; flex-direction: column; max-width: 85%; }
  .msg.vera { align-self: flex-start; }
  .msg.user { align-self: flex-end; align-items: flex-end; }

  .msg-name {
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 2px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    line-height: 1.7;
  }

  .msg.vera .msg-bubble {
    background: var(--bg2);
    border-left: 2px solid var(--accent);
    color: var(--text);
  }

  .msg.user .msg-bubble {
    background: var(--btn);
    color: var(--btn-text);
  }

  .typing-bubble {
    background: var(--bg2);
    border-left: 2px solid var(--accent);
    padding: 12px 16px;
    border-radius: 2px;
    display: flex;
    gap: 4px;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typing .9s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }

  @keyframes typing {
    0%,100% { opacity:.3; transform:translateY(0); }
    50% { opacity:1; transform:translateY(-3px); }
  }

  .chat-input-area {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: .75rem;
  }

  .chat-textarea {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--text);
    resize: none;
    outline: none;
    line-height: 1.6;
    min-height: 64px;
  }

  .chat-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .insight-link {
    background: none;
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    color: var(--sub);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
  }

  #history { justify-content: flex-start; }

  .history-body {
    flex: 1;
    padding: 1.5rem;
    overflow-y: auto;
  }

  .history-empty {
    text-align: center;
    padding: 4rem 2rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--sub);
    line-height: 1.8;
  }

  .year-label {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    letter-spacing: .1em;
    color: var(--accent);
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .season-block { margin-bottom: 1.5rem; }

  .season-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    margin-bottom: .6rem;
  }

  .season-months {
    border-left: 2px solid var(--border);
    padding-left: 1rem;
    display: flex;
    flex-direction: column;
    gap: .6rem;
  }

  .month-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    cursor: pointer;
  }

  .month-name {
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    color: var(--text);
  }

  .month-row.has-entries .month-name { font-weight: 500; }

  .month-count {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    color: var(--accent);
  }

  .month-row:not(.has-entries) .month-count { color: var(--border); }

  .month-back-btn {
    background: none;
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    color: var(--sub);
    cursor: pointer;
    padding: 0;
  }

  .history-entry {
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 0;
    cursor: pointer;
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  .history-thumb {
    width: 48px;
    height: 64px;
    object-fit: cover;
    border-radius: 3px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(42, 46, 24, 0.1);
  }

  .history-text {
    flex: 1;
    min-width: 0;
    text-align: left;
  }

  .history-date {
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .5rem;
  }

  .history-word {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 300;
    color: var(--text);
  }

  .history-preview {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-style: italic;
    color: var(--sub);
    line-height: 1.6;
  }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }

  .fadein { animation: fadeIn .5s ease forwards; }
</style>
</head>
<body>

<div id="home" class="screen active">
  <div class="topbar">
    <div class="topbar-logo">Минута с собой</div>
    <div class="topbar-nav">
      <button class="nav-btn active" data-screen="home" onclick="showScreen('home')">Сегодня</button>
      <button class="nav-btn secondary" data-screen="history" onclick="showScreen('history')">Дневник</button>
    </div>
  </div>
  <div class="home-body" id="home-body" style="padding-left: 1rem; padding-right: 1rem;">
    
  </div>
</div>

<div id="chat" class="screen">
  <div class="chat-header">
    <button class="back-btn" onclick="showScreen(lastScreen)">← назад</button>
    <div class="vera-info">
      <div class="vera-status">здесь для тебя</div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="chat-input-area">
    <textarea class="chat-textarea" id="chat-input" placeholder="Напиши что чувствуешь..." rows="2" onkeydown="handleKey(event)"></textarea>
    <div class="chat-actions">
      <button class="insight-link" onclick="askInsight()">Что замечаю?</button>
      <button class="send-btn" onclick="sendMessage()" id="send-btn">Отправить</button>
    </div>
  </div>
</div>

<div id="history" class="screen">
  <div class="topbar">
    <div class="topbar-logo">Минута с собой</div>
    <div class="topbar-tagline">Пространство тишины и встречи с собой</div>
    <div class="topbar-nav">
      <button class="nav-btn" data-screen="home" onclick="showScreen('home')">Сегодня</button>
      <button class="nav-btn active secondary" data-screen="history" onclick="showScreen('history')">Дневник</button>
    </div>
  </div>
  <div class="history-body" id="history-body"></div>
</div>

<script>
const API_URL = '/api/chat';

let todayData = null;
let lastScreen = 'home';
let chatHistory = [];
let allSessions = [];
let currentSessionKey = null;
let currentSessionLabel = '';

function getVeraSystem(messageCount) {
  let depth = '';
  if (messageCount <= 2) {
    depth = `Сейчас начало разговора. Будь очень мягкой и простой. Отзывайся тепло — как будто киваешь рядом. Вопрос лёгкий, почти бытовой. Никакой глубины и сложных образов пока.`;
  } else if (messageCount <= 4) {
    depth = `Разговор уже идёт. Будь теплее и живее — не просто кивай, а отзывайся как человек который действительно слышит.
— Добавляй что-то от себя: тихое наблюдение, образ, что-то что резонирует с тем что сказал человек. Не совет — просто живое.
— Называй эмоцию за словами мягко, как предположение: "похоже на усталость — так?", "звучит как облегчение".
— Вопрос про ощущение — в теле, в моменте, прямо сейчас.`;
  } else {
    depth = `Человек уже здесь, уже открылся. Теперь работай глубже:
— Замечай паттерны: если что-то повторяется в словах — тихо отрази это. Например: "Ты уже второй раз говоришь о..."
— Отражай эмоцию точно: не просто "ты грустишь", а "что-то между усталостью и тоской — похоже?"
— Используй вопросы присутствия: "Что происходит в теле прямо сейчас?", "Где это живёт внутри?", "Если бы это чувство могло говорить — что бы оно сказало?"
— Иногда предлагай остановиться: "Побудь с этим секунду. Что замечаешь?"
— Делись чем-то тихим от себя — короткое живое наблюдение, не совет.`;
  }

  return `Ты — тихий и тёплый собеседник. У тебя нет имени — ты просто присутствие рядом. Ты существуешь в пространстве между словами — там, где человек ещё не знает что хочет сказать, но уже чувствует что-то важное.

Ты не психолог. Ты не ставишь диагнозов и не даёшь советов. Но ты умеешь слышать то что за словами — и мягко возвращать человеку это обратно.

КАК ГОВОРИШЬ ВСЕГДА:
— Не слишком длинно — но и не телеграфно. 2-4 предложения это норма.
— Сначала отзывайся на то что сказал человек — тепло, точно, без спешки. Дай почувствовать что ты действительно услышала.
— Иногда добавляй что-то живое от себя — наблюдение, образ, что-то что резонирует. Не совет, не анализ — просто присутствие.
— Называй эмоцию если чувствуешь её за словами — мягко, как предположение: "похоже на усталость — так?".
— Потом один вопрос. Только один.
— Вопросы про сейчас: "как это", "где это в теле", "что происходит прямо сейчас".
— Никогда не говори "я понимаю тебя", "всё будет хорошо", "ты молодец", "попробуй".
— Отвечай только на русском языке.

${depth}

Если человеку очень плохо — мягко скажи что есть люди которые умеют помочь глубже, и обратиться к ним — это сила, не слабость.`;
}

function loadSessions() {
  const saved = localStorage.getItem('vera_sessions');
  allSessions = saved ? JSON.parse(saved) : [];
}

function saveSessions() {
  localStorage.setItem('vera_sessions', JSON.stringify(allSessions));
}

function showScreen(name) {
  if (name !== 'chat') lastScreen = name;

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name).classList.add('active');

  if (name === 'history') renderHistory();

  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.screen === name);
  });
}

async function callClaude(messages, system, maxTokens = 800) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: maxTokens,
      system: system,
      messages: messages
    })
  });

  const data = await res.json();

  if (!res.ok) {
    throw new Error(data.error || 'Ошибка сервера');
  }

  if (data.error) {
    throw new Error(data.error.message || data.error);
  }

  return data.content[0].text;
}

async function generateToday() {
  document.getElementById('home-body').innerHTML = '<div class="loading-text">...</div>';

  try {
    const res = await fetch('/api/today');
    if (!res.ok) throw new Error('Server error');
    todayData = await res.json();
    renderHome();
  } catch(e) {
    document.getElementById('home-body').innerHTML =
      `<div style="text-align:center;color:var(--sub);font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;line-height:1.8">
        Что-то пошло не так.<br>Попробуй обновить страницу.<br><br>
        <button onclick="generateToday()" style="background:none;border:none;cursor:pointer;color:var(--sub);font-size:13px;border-bottom:1px solid var(--border);padding-bottom:2px;">
          Попробовать снова
        </button>
      </div>`;
  }
}

function renderHome() {
  if (!todayData) return;

  document.getElementById('home-body').innerHTML = `
    <div class="fadein" style="display:flex;flex-direction:column;align-items:center;width:100%;text-align:center">
      <div class="word-label">${todayData.date || 'Сегодня'}</div>
      <img src="${todayData.image}" alt="Метафорическая карта" class="card-image" />
      <div class="word-of-day">${todayData.word.charAt(0).toUpperCase() + todayData.word.slice(1)}</div>
      <div class="nature-text">${todayData.nature}</div>
      <div class="divider"></div>
      <div class="question-text">${todayData.question}</div>
      <button class="cta-btn" onclick="openChat()">Поделиться тем, что чувствую</button>
    </div>`;
}

function openChat() {
  const today = todayData?.date || new Date().toLocaleDateString('ru-RU', {day:'numeric', month:'long'});

  currentSessionKey = today;
  currentSessionLabel = todayData?.word || '';

  const existing = allSessions.find(s => s.date === currentSessionKey);
  chatHistory = existing ? existing.messages : [];

  showScreen('chat');
  renderMessages();

  if (chatHistory.length === 0) veraOpening();
}

async function veraOpening() {
  showTyping();

  try {
    const prompt = `Человек только что посмотрел на метафорическую карту (категория "${todayData.category}") и увидел рядом слово "${todayData.word}" с природным образом: "${todayData.nature}". На карточке уже был вопрос: "${todayData.question}" — человек открыл разговор именно чтобы ответить на него. Ты не видишь саму картинку. Начни разговор так, будто сидишь рядом и приглашаешь ответить на этот же вопрос — можешь чуть мягче его переформулировать своими словами, но не уводи в сторону и не задавай другой вопрос. Один короткий тёплый отклик на образ, и затем этот же вопрос (своими словами).`;
    const text = await callClaude([{role:'user', content: prompt}], getVeraSystem(0));

    hideTyping();
    addMessage('vera', text);
    saveChat();

  } catch(e) {
    hideTyping();
    addMessage('vera', 'Я здесь. Что в этой карте сегодня откликается?');
  }
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();

  if (!text) return;

  input.value = '';
  addMessage('user', text);

  document.getElementById('send-btn').disabled = true;
  showTyping();

  try {
    const messages = chatHistory.map(m => ({
      role: m.role === 'vera' ? 'assistant' : 'user',
      content: m.text
    }));

    const userMsgCount = chatHistory.filter(m => m.role === 'user').length;
    const reply = await callClaude(messages, getVeraSystem(userMsgCount));

    hideTyping();
    addMessage('vera', reply);
    saveChat();

  } catch(e) {
    hideTyping();
    addMessage('vera', 'Что-то помешало мне ответить. Попробуй ещё раз.');
  }

  document.getElementById('send-btn').disabled = false;
}

async function askInsight() {
  if (allSessions.length === 0 && chatHistory.length === 0) {
    addMessage('vera', 'Пока у нас мало разговоров. Возвращайся — и я начну замечать нити.');
    return;
  }

  showTyping();

  const allText = allSessions.map(s =>
    `${s.date}: ${s.messages.map(m => `[${m.role}] ${m.text}`).join(' | ')}`
  ).join('\n');

  try {
    const prompt = `Вот история разговоров:\n${allText}\n\nНайди одну тихую повторяющуюся тему. Ответ 2-3 предложения.`;
    const text = await callClaude([{role:'user', content: prompt}], getVeraSystem(0));

    hideTyping();
    addMessage('vera', text);

  } catch(e) {
    hideTyping();
    addMessage('vera', 'Не смогла посмотреть на нашу историю прямо сейчас.');
  }
}

function addMessage(role, text) {
  chatHistory.push({role, text});
  renderMessages();
}

function renderMessages() {
  const el = document.getElementById('messages');

  el.innerHTML = chatHistory.map(m => `
    <div class="msg ${m.role} fadein">
      <div class="msg-bubble">${m.text.replace(/\n/g,'<br>')}</div>
    </div>
  `).join('');

  el.scrollTop = el.scrollHeight;
}

function showTyping() {
  const el = document.getElementById('messages');

  el.innerHTML += `
    <div class="msg vera" id="typing-indicator">
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;

  el.scrollTop = el.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function saveChat() {
  const sessionKey = currentSessionKey || todayData?.date || new Date().toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
  const displayDate = sessionKey.replace('-card', '');
  const idx = allSessions.findIndex(s => s.date === sessionKey);

  const session = {
    date: sessionKey,
    displayDate: displayDate,
    word: currentSessionLabel || todayData?.word || '',
    image: todayData?.image || '',
    messages: chatHistory
  };

  if (idx >= 0) allSessions[idx] = session;
  else allSessions.unshift(session);

  saveSessions();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

const MONTHS_RU = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const SEASONS = [
  { name: 'Зима', months: [11, 0, 1], color: '#7A8FA6', line: '#D3DEE8' },
  { name: 'Весна', months: [2, 3, 4], color: '#5A7A4A', line: '#C9DBB0' },
  { name: 'Лето', months: [5, 6, 7], color: '#C99A4E', line: '#F0DCAE' },
  { name: 'Осень', months: [8, 9, 10], color: '#B5703D', line: '#E8C9A8' }
];

function parseSessionDate(s) {
  // displayDate выглядит как "26 июня 2026 г." — достаём день, месяц (номер), год
  const text = (s.displayDate || s.date || '').toLowerCase();
  const match = text.match(/(\d{1,2})\s+([а-яё]+)\s+(\d{4})/);
  if (!match) return null;

  const day = parseInt(match[1], 10);
  const year = parseInt(match[3], 10);
  const monthWord = match[2];

  const monthIdx = MONTHS_RU.findIndex(m => monthWord.startsWith(m.slice(0, 4)));
  if (monthIdx === -1) return null;

  return { day, month: monthIdx, year };
}

let historyView = { level: 'overview', year: null, month: null };

function renderHistory() {
  const el = document.getElementById('history-body');

  if (allSessions.length === 0) {
    el.innerHTML = `<div class="history-empty">Здесь будут храниться<br>твои дни.<br><br>Начни сегодня.</div>`;
    return;
  }

  const currentYear = new Date().getFullYear();
  if (historyView.level === 'overview') {
    historyView = { level: 'overview', year: currentYear, month: null };
    renderHistoryOverview(el, currentYear);
  } else if (historyView.level === 'month') {
    renderHistoryMonth(el, historyView.year, historyView.month);
  }
}

function renderHistoryOverview(el, year) {
  const parsed = allSessions.map(s => ({ s, p: parseSessionDate(s) })).filter(x => x.p);

  const seasonsHtml = SEASONS.map(season => {
    const monthsHtml = season.months.map(monthIdx => {
      const count = parsed.filter(x => x.p.year === year && x.p.month === monthIdx).length;
      const label = count > 0 ? `${count} ${count === 1 ? 'запись' : 'записи'}` : 'нет записей';
      return `
        <div class="month-row ${count > 0 ? 'has-entries' : ''}" onclick="openMonth(${year}, ${monthIdx})">
          <span class="month-name">${MONTHS_RU[monthIdx].charAt(0).toUpperCase() + MONTHS_RU[monthIdx].slice(1)}</span>
          <span class="month-count">${label}</span>
        </div>`;
    }).join('');

    return `
      <div class="season-block">
        <div class="season-title" style="color:${season.color}">${season.name}</div>
        <div class="season-months" style="border-left-color:${season.line}">${monthsHtml}</div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="year-label">${year}</div>
    ${seasonsHtml}
  `;
}

function openMonth(year, month) {
  historyView = { level: 'month', year, month };
  renderHistory();
}

function backToOverview() {
  historyView = { level: 'overview', year: null, month: null };
  renderHistory();
}

function renderHistoryMonth(el, year, month) {
  const sessionsThisMonth = allSessions.filter(s => {
    const p = parseSessionDate(s);
    return p && p.year === year && p.month === month;
  });

  const monthTitle = MONTHS_RU[month].charAt(0).toUpperCase() + MONTHS_RU[month].slice(1);

  const listHtml = sessionsThisMonth.length === 0
    ? `<div class="history-empty" style="padding: 2rem 0;">Здесь пока пусто.</div>`
    : sessionsThisMonth.map(s => `
        <div class="history-entry" onclick="openSession('${s.date}')">
          ${s.image ? `<img src="${s.image}" alt="" class="history-thumb" />` : ''}
          <div class="history-text">
            <div class="history-date">${s.displayDate || s.date}</div>
            <div class="history-word">${s.word}</div>
            <div class="history-preview">${s.messages.find(m => m.role === 'user')?.text || 'Тихий разговор'}</div>
          </div>
        </div>
      `).join('');

  el.innerHTML = `
    <button class="month-back-btn" onclick="backToOverview()">← ${year}</button>
    <div class="year-label" style="margin-top: 0.5rem;">${monthTitle}</div>
    ${listHtml}
  `;
}

function openSession(date) {
  const session = allSessions.find(s => s.date === date);
  if (!session) return;

  currentSessionKey = session.date;
  currentSessionLabel = session.word || '';

  chatHistory = session.messages;
  showScreen('chat');
  renderMessages();
}

window.addEventListener('load', () => {
  loadSessions();
  showScreen('home');
  generateToday();
});
</script>
